# Governing config for the repo-config-gaps fix tests.
# Both controls live under review_settings (the schema's canonical location).
enabled: true
review_settings:
  enabled: true
  max_files_per_review: 25
  # Cap inline comments at 3 — extras go to an "omitted findings" note in the summary.
  max_comments: 3
  # Only error/critical findings post inline; warning/info drop to a summary section.
  comment_severity_threshold: error
