# AI PR-reviewer configuration for the AmaliAI MCP server.
#
# This file is read from the BASE branch a pull request targets, so it governs
# how every PR into that branch is reviewed.
enabled: true

review_settings:
  enabled: true
  # Intentionally small for verification: at most 2 files should be reviewed.
  max_files_per_review: 2
  max_comments: 10
  comment_severity_threshold: warning
  disabled_categories: []

file_rules:
  enabled: true
  ignored_files:
    - "target/**"
    - "**/*.class"
    - ".idea/**"
    - ".mvn/**"
    - "mvnw"
    - "mvnw.cmd"
    - "*.log"
