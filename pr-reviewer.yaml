# AI PR-reviewer configuration for the AmaliAI MCP server.
#
# Read from the BASE branch a pull request targets.
enabled: true

review_settings:
  enabled: true
  # At most 2 files should be reviewed per PR.
  max_files_per_review: 2
  max_comments: 10
  comment_severity_threshold: warning
  disabled_categories: []

file_rules:
  enabled: true
  ignored_files:
    - "target/**"
    - "**/*.class"
    - ".idea/**"
    - ".mvn/**"
    - "mvnw"
    - "mvnw.cmd"
    - "*.log"
  # RangeUtil is business-critical: it must be reviewed even when the file cap is hit.
  critical_files:
    - "**/RangeUtil.java"
