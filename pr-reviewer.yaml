# AI PR-reviewer configuration for the AmaliAI MCP server.
#
# NOTE: This file is intentionally INVALID for bug replication.
# It is valid YAML but omits the required `max_files_per_review` field under
# review_settings, so it fails the PRReviewerConfig schema.
enabled: true

review_settings:
  # Only max_comments is set; max_files_per_review (required) is missing.
  max_comments: 5
  comment_severity_threshold: warning
