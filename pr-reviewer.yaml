# AI PR-reviewer configuration for the AmaliAI MCP server.
#
# This file is read from the BASE branch a pull request targets, so it governs
# how every PR into that branch is reviewed.
enabled: true

review_settings:
  enabled: true
  max_files_per_review: 25
  max_comments: 10
  comment_severity_threshold: warning
  disabled_categories: []
  # Repo-relative path to the mandatory style guide the reviewer should enforce.
  style_guide_path: docs/STYLE_GUIDE.md

file_rules:
  enabled: true
  ignored_files:
    - "target/**"
    - "**/*.class"
    - ".idea/**"
    - ".mvn/**"
    - "mvnw"
    - "mvnw.cmd"
    - "*.log"
  critical_files:
    - "src/main/java/com/amaliai/mcp/servers/**/service/**"
    - "src/main/java/com/amaliai/mcp/servers/**/client/**"
