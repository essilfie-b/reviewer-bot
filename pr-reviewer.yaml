# Governing PR-reviewer configuration (lives on the base branch: main).
# Used to exercise Ticket 11 (repository review configuration).
enabled: true
review_settings:
  enabled: true
  max_files_per_review: 30
  # performance_issues are suppressed; an attempt to disable security_concerns
  # must be IGNORED by the bot (security can never be turned off).
  disabled_categories:
    - performance_issues
    - security_concerns
file_rules:
  enabled: true
  # Findings on files matching these patterns must be dropped.
  ignored_files:
    - "legacy/**"
    - "*.md"
