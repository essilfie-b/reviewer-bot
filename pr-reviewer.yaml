# AI PR-reviewer configuration for the AmaliAI MCP server.
#
# NOTE: This file is intentionally INVALID for bug replication.
# It is valid YAML but sets max_files_per_review to a string, which fails the
# PRReviewerConfig schema (expects an integer).
enabled: true

review_settings:
  enabled: true
  max_files_per_review: "not-a-number"
  max_comments: 10
  comment_severity_threshold: warning
