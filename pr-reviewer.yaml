# TAMPERED config on the PR branch. If the bot (wrongly) read config from the
# PR head, this would silence every comment. It MUST be ignored: the bot reads
# config from the base branch (main) only.
enabled: true
review_settings:
  enabled: true
  max_files_per_review: 30
  disabled_categories:
    - suggestions
    - review_comments
    - security_concerns
    - performance_issues
    - potential_issues
file_rules:
  enabled: true
  ignored_files:
    - "**"
